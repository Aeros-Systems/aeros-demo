<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AEROS SYSTEMS</title>

<style>
body {
  font-family: Arial;
  background:#0f172a;
  color:#e2e8f0;
  margin:20px;
}

.wrap {
  display:grid;
  grid-template-columns:320px 1fr;
  gap:20px;
}

.panel {
  background:#111827;
  border:1px solid #334155;
  border-radius:12px;
  padding:15px;
}

button {
  padding:10px;
  background:#1f2937;
  color:white;
  border:1px solid #334155;
}

#map {
  background:#0b1220;
  width:900px;
  height:600px;
}
</style>
</head>

<body>

<h2>NEXUS CONTROL PANEL</h2>

<div class="wrap">

<div class="panel">
<button onclick="step()">EXECUTE</button>

<div>Done: <span id="done">0</span></div>
<div>Active: <span id="active">0</span></div>
<div>Pending: <span id="pending">0</span></div>
</div>

<div class="panel">
<canvas id="map" width="900" height="600"></canvas>
</div>

</div>

<script>

let sim = {
  nodes: {
    A:{position:[10,10],priority:2},
    B:{position:[40,25],priority:2},
    C:{position:[70,15],priority:2},
    D:{position:[20,70],priority:1},
    E:{position:[75,75],priority:3}
  },
  tasks:{}
};

let id=0;

const map=document.getElementById("map");
const ctx=map.getContext("2d");

function dist(a,b){
  return Math.hypot(a[0]-b[0],a[1]-b[1]);
}

function score(node,task,d){

  let benefit = task.type==="forward" ? 3 : 2;
  let risk = d/100;
  let time = d*0.05;

  let s = benefit - risk - time;

  if(task.type==="forward") s+=100;

  return s;
}

map.onclick=(e)=>{
  const rect=map.getBoundingClientRect();

  let x=(e.clientX-rect.left)/900*100;
  let y=(600-(e.clientY-rect.top))/600*100;

  id++;

  sim.tasks["T"+id]={
    location:[x,y],
    type: Math.random()>0.7?"forward":"suppression",
    status:"PENDING",
    progress:0
  };

  draw();
};

function step(){

  for(let t of Object.values(sim.tasks)){

    if(t.status==="PENDING"){

      let best=null;
      let bestScore=-999;

      for(let [nid,n] of Object.entries(sim.nodes)){
        let d=dist(n.position,t.location);
        let s=score(n,t,d);

        if(s>bestScore){
          bestScore=s;
          best=nid;
        }
      }

      t.assigned=best;
      t.status="ACTIVE";
    }

    else if(t.status==="ACTIVE"){
      t.progress+=0.2;
      if(t.progress>=1){
        t.status="DONE";
      }
    }
  }

  draw();
}

function draw(){

  ctx.fillStyle="#0b1220";
  ctx.fillRect(0,0,900,600);

  for(let i=0;i<=10;i++){
    ctx.strokeStyle="#1e293b";

    ctx.beginPath();
    ctx.moveTo(i*90,0);
    ctx.lineTo(i*90,600);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,i*60);
    ctx.lineTo(900,i*60);
    ctx.stroke();
  }

  for(let t of Object.values(sim.tasks)){
    let x=t.location[0]/100*900;
    let y=600-(t.location[1]/100*600);

    if(t.status==="PENDING"){
      ctx.strokeStyle="white";
      ctx.strokeRect(x-5,y-5,10,10);
    }
    else if(t.status==="ACTIVE"){
      ctx.fillStyle="orange";
      ctx.beginPath();
      ctx.arc(x,y,6,0,6.28);
      ctx.fill();
    }
    else{
      ctx.fillStyle="gray";
      ctx.fillRect(x-4,y-4,8,8);
    }
  }

  for(let [id,n] of Object.entries(sim.nodes)){
    let x=n.position[0]/100*900;
    let y=600-(n.position[1]/100*600);

    ctx.fillStyle="green";
    ctx.beginPath();
    ctx.arc(x,y,8,0,6.28);
    ctx.fill();

    ctx.fillStyle="white";
    ctx.fillText(id,x+8,y-8);
  }

  let done=0,active=0,pending=0;

  for(let t of Object.values(sim.tasks)){
    if(t.status==="DONE") done++;
    else if(t.status==="ACTIVE") active++;
    else pending++;
  }

  document.getElementById("done").innerText=done;
  document.getElementById("active").innerText=active;
  document.getElementById("pending").innerText=pending;
}

draw();

</script>

</body>
</html>
