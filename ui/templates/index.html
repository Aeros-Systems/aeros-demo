<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AEROS SYSTEMS</title>

<style>
body {
  font-family: Arial;
  margin: 20px;
  background: #0f172a;
  color: #e2e8f0;
}

.wrap {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 20px;
}

.panel {
  background: #111827;
  border: 1px solid #334155;
  border-radius: 12px;
  padding: 15px;
  box-shadow: 0 0 20px rgba(0,0,0,0.40);
}

button, select {
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid #334155;
  background: #1f2937;
  color: #e2e8f0;
  cursor: pointer;
}

button:hover { background:#2d3a4f; }

#continuity.NORMAL { color: #22c55e; }
#continuity.WARNING { color: #f59e0b; }
#continuity.CRITICAL { color: #ef4444; }

#map {
  background: #0b1220;
  border-radius: 12px;
  width: 900px;
  height: 600px;
}

h1 { color: #e2e8f0; }
h2 { color: #7aa2ff; }

.stat {
  margin: 8px 0;
  font-weight: bold;
  color: #7aa2ff;
}
</style>
</head>

<body>

<h2>NEXUS CONTROL PANEL</h2>
<h1>AEROS - Command Interface</h1>

<div class="wrap">

<div class="panel">
<label>NEXUS TASK INJECTION</label><br>

<select id="eventType">
<option value="suppression">Suppression</option>
<option value="forward">Forward / flare-up</option>
</select>

<div style="margin-top:12px;">
<button onclick="stepOnce()">EXECUTE</button>
</div>

<div class="stat">Done: <span id="done">0</span></div>
<div class="stat">Active: <span id="active">0</span></div>
<div class="stat">Pending: <span id="pending">0</span></div>
</div>

<div class="panel">
<canvas id="map" width="900" height="600"></canvas>
</div>

</div>

<script>

let sim = { nodes: {}, tasks: {}, cycle_state: {} };

const map = document.getElementById('map');
const ctx = map.getContext('2d');
const W = map.width, H = map.height;

function worldToCanvas(x, y) {
  return [x/100 * W, H - (y/100 * H)];
}

function drawNode(id, n) {
  const [x, y] = worldToCanvas(n.position[0], n.position[1]);

  let color = '#3b82f6';
  if (n.role === 'forward') color = '#ef4444';
  if (n.role === 'corridor') color = '#22c55e';

  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y, 8, 0, Math.PI*2);
  ctx.fill();

  ctx.fillStyle = '#ffffff';
  ctx.fillText(id, x + 10, y - 8);
}

function drawTask(id, t) {
  const [x, y] = worldToCanvas(t.location[0], t.location[1]);

  if (t.status === 'PENDING') {
    ctx.strokeStyle = '#ffffff';
    ctx.strokeRect(x-5, y-5, 10, 10);

  } else if (t.status === 'ACTIVE') {
    ctx.fillStyle = 'orange';
    ctx.beginPath();
    ctx.arc(x, y, 6, 0, Math.PI*2);
    ctx.fill();

  } else {
    ctx.fillStyle = '#94a3b8';
    ctx.fillRect(x-4, y-4, 8, 8);
  }
}

function render() {

  ctx.fillStyle = '#0b1220';
  ctx.fillRect(0,0,W,H);

  ctx.strokeStyle = '#1e293b';
  for (let i=0;i<=10;i++){
    ctx.beginPath();
    ctx.moveTo(i*W/10,0);
    ctx.lineTo(i*W/10,H);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,i*H/10);
    ctx.lineTo(W,i*H/10);
    ctx.stroke();
  }

  for (const [id, t] of Object.entries(sim.tasks || {})) {
    drawTask(id, t);
  }

  for (const [id, n] of Object.entries(sim.nodes || {})) {
    drawNode(id, n);
  }

  const c = sim.cycle_state || {};
  document.getElementById('done').innerText = c.done ?? 0;
  document.getElementById('active').innerText = c.active ?? 0;
  document.getElementById('pending').innerText = c.pending ?? 0;
}

async function stepOnce() {
  const res = await fetch('/state');
  sim = await res.json();
  render();
}

map.addEventListener('click', async (ev) => {

  const rect = map.getBoundingClientRect();
  const cx = ev.clientX - rect.left;
  const cy = ev.clientY - rect.top;

  const x = (cx / W) * 100;
  const y = ((H - cy) / H) * 100;

  const type = document.getElementById('eventType').value;

  await fetch('/add_event', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({x, y, type})
  });

  await stepOnce();
});

stepOnce();

</script>

</body>
</html>
